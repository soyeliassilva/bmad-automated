workflows:
  create-story:
    prompt_template: >-
      /bmad-create-story - Create story: {{.StoryKey}}. Do not ask questions.
      DEFERRED QUESTIONS: When you encounter uncertainty where documentation is
      incomplete or ambiguous and you must assume a decision, do NOT stop. Make
      your best judgment and proceed, but append the question to
      _bmad-output/implementation-artifacts/deferred-questions.md using this
      exact format per question:

      ## {{.StoryKey}} — [Brief title of the uncertainty]

      - **Question:** What you were uncertain about

      - **Decision made:** What you chose and why

      - **Alternatives:** Other viable options you considered

      - **Confidence:** Low / Medium / High

      - **Files affected:** List of files impacted by this decision

  dev-story:
    prompt_template: >-
      /bmad-dev-story - Work on story: {{.StoryKey}}. Complete all tasks. Run
      tests after each implementation. Do not ask clarifying questions - use
      best judgment based on existing patterns.
      DEFERRED QUESTIONS: When you encounter uncertainty where documentation is
      incomplete or ambiguous and you must assume a decision, do NOT stop. Make
      your best judgment and proceed, but append the question to
      _bmad-output/implementation-artifacts/deferred-questions.md using this
      exact format per question:

      ## {{.StoryKey}} — [Brief title of the uncertainty]

      - **Question:** What you were uncertain about

      - **Decision made:** What you chose and why

      - **Alternatives:** Other viable options you considered

      - **Confidence:** Low / Medium / High

      - **Files affected:** List of files impacted by this decision

  code-review:
    prompt_template: >-
      /bmad-code-review - Review story: {{.StoryKey}}. When presenting fix
      options, always choose to auto-fix all issues immediately. Do not wait
      for user input.
      DEFERRED QUESTIONS: When you encounter uncertainty where documentation is
      incomplete or ambiguous and you must assume a decision, do NOT stop. Make
      your best judgment and proceed, but append the question to
      _bmad-output/implementation-artifacts/deferred-questions.md using this
      exact format per question:

      ## {{.StoryKey}} — [Brief title of the uncertainty]

      - **Question:** What you were uncertain about

      - **Decision made:** What you chose and why

      - **Alternatives:** Other viable options you considered

      - **Confidence:** Low / Medium / High

      - **Files affected:** List of files impacted by this decision

  git-commit:
    prompt_template: "Commit all changes for story {{.StoryKey}} with a descriptive commit message following conventional commits format. Then push to the current branch. Do not ask questions."

full_cycle:
  steps:
    - create-story
    - dev-story
    - code-review
    - git-commit

claude:
  output_format: stream-json
  binary_path: claude

output:
  truncate_lines: 20
  truncate_length: 60
